name: Windows Electron CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          echo "PACKAGE_VERSION=${TAG_NAME}" >> $GITHUB_ENV
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const pkgPath = path.resolve(process.cwd(), 'package.json');
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          const version = process.env.TAG_NAME;
          if (pkg.version !== version) {
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated package.json version to', version);
          } else {
            console.log('package.json version already', version);
          }
          NODE

      - name: Set prerelease package version
        if: github.ref == 'refs/heads/main'
        run: |
          npm version prerelease --preid=build --no-git-tag-version
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Build local Docker image
        run: docker build -t trustinn-windows-builder .

      - name: Run Windows app build in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            trustinn-windows-builder

      - name: List build artifacts
        run: ls -al dist

      - name: Create GitHub release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          name: Trustinn Windows App ${{ github.ref_name }}
          body: "Automated Windows build for version ${{ github.ref_name }} from main branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
