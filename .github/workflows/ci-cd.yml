name: Windows Electron CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set package version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "PACKAGE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            npm version prerelease --preid=build --no-git-tag-version
            echo "PACKAGE_VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV
          fi

      - name: Build Windows app in Docker
        uses: addnab/docker-run-action@v3
        with:
          image: nitminer/trustinn-desktop:latest
          options: --workdir /workspace -v "${{ github.workspace }}:/workspace"
          run: |
            npm install
            npm run dist
            ls -al dist

      - name: Create GitHub release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          name: Trustinn Windows App ${{ github.ref_name }}
          body: "Automated Windows build for version ${{ github.ref_name }} from main branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
